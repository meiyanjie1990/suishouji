name: 微信提醒
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:  # 允许手动触发测试

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 检查到期任务并推送微信提醒
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          tz = timezone(timedelta(hours=8))  # 北京时间
          now = datetime.now(tz)

          # 读取任务数据
          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          tasks = data.get('tasks', [])
          updated = False
          sent_count = 0

          for task in tasks:
              if task.get('status') != 'pending':
                  continue
              if task.get('wxNotified'):
                  continue

              due_str = task.get('dueDate', '')
              if not due_str:
                  continue
              try:
                  due_date = datetime.fromisoformat(due_str)
              except:
                  continue

              # 到期或过期就推送
              if due_date <= now:
                  title = task.get('title', '未命名任务')
                  has_time = task.get('hasTime', False)

                  if has_time:
                      body = f"⏰ 预定时间：{due_date.strftime('%m月%d日 %H:%M')}"
                  else:
                      body = f"📅 截止：{due_date.strftime('%m月%d日')}"

                  # 调用 WxPusher API
                  msg_data = json.dumps({
                      "appToken": "AT_84J8kQE5oYtE9x9TSCNDoXmV31LFLv6J",
                      "content": f"⏰ {title}\n{body}\n\n👉 打开随手记查看",
                      "contentType": 1,
                      "uids": ["UID_O2fhswuVShCjJi92Za9g58R708mt"]
                  }).encode('utf-8')

                  try:
                      req = urllib.request.Request(
                          'https://wxpusher.zjiecode.com/api/send/message',
                          data=msg_data,
                          headers={'Content-Type': 'application/json'}
                      )
                      resp = urllib.request.urlopen(req, timeout=10)
                      result = json.loads(resp.read())
                      if result.get('code') == 1000:
                          task['wxNotified'] = True
                          updated = True
                          sent_count += 1
                          print(f"✅ 已推送：{title}")
                      else:
                          print(f"❌ WxPusher返回错误：{result}")
                  except Exception as e:
                      print(f"❌ 推送失败：{title} - {e}")

          print(f"共推送 {sent_count} 条提醒")

          if updated:
              data['updatedAt'] = now.isoformat()
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              # 标记文件已修改，commit 步骤会提交
              with open('CHANGED', 'w') as f:
                  f.write('1')
          PYEOF

      - name: 提交变更
        if: success()
        run: |
          if [ -f CHANGED ]; then
            git config user.name "随手记Bot"
            git config user.email "bot@suishouji.local"
            git add data.json
            git commit -m "🤖 推送提醒 $(date +'%m/%d %H:%M')"
            git push
            rm CHANGED
          fi
